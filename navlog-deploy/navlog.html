<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Navlog Prototype – Nav Log</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 24px; }
    .bar { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
    button { padding:8px 14px; border-radius:8px; border:1px solid #999; background:#f2f2f2; cursor: pointer; }
    button:hover { background: #e6e6e6; }
    .meta { font-size:13px; color:#555; }

    .wrap { display:flex; gap:16px; align-items:flex-start; }
    .panel {
      width: 380px;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      background: #fafafa;
    }
    textarea {
      width: 100%;
      height: 120px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    .row { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
    .small { font-size: 12px; color:#444; }
    .list {
      margin-top: 10px;
      max-height: 260px;
      overflow:auto;
      border: 1px solid #e3e3e3;
      border-radius: 8px;
      background: white;
      padding: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      white-space: pre;
    }
    label { font-size: 12px; color:#333; display:flex; gap:8px; align-items:center; margin-top:8px; }

    #pages { display:flex; flex-direction:column; gap:18px; }
    .page {
      width: 11in;
      height: 8.5in;
      position: relative;
      background-image: url("navlog_form.png");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      border: 1px solid #ddd;
      overflow: hidden;
    }

    .mappedBox{
      position: absolute;
      pointer-events: none;
      z-index: 5000;
      box-sizing: border-box;

      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 2px 3px;

      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;

      /* visible while debugging */
      color: black;
      font-weight: 400;
      text-shadow: none;

      background: transparent;
      outline: none;
    }

    .drawRect {
      position: absolute;
      border: 2px solid rgba(0, 140, 255, 0.95);
      background: rgba(0, 140, 255, 0.12);
      border-radius: 4px;
      z-index: 9999;
      pointer-events: none;
      box-sizing: border-box;
    }

    #coordBox{
      position: fixed;
      bottom: 10px;
      left: 10px;
      background: black;
      color: lime;
      padding: 6px 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 14px;
      z-index: 99999;
      border-radius: 6px;
      opacity: 0.92;
      white-space: pre;
      user-select: text;
    }

    @media print {
      .bar, .panel, #coordBox { display:none; }
      body { margin:0; }
      .page { border:none; page-break-after:always; }
      #pages { gap:0; }
      .drawRect { display:none; }
      .mappedBox { outline: none; background: transparent; color: transparent; text-shadow:none; }
    }

    /* =========================
       NAVLOG RENDER MODE (default)
       ========================= */
    body.renderOnly .panel,
    body.renderOnly .meta,
    body.renderOnly #coordBox,
    body.renderOnly .drawRect {
      display: none !important;
    }
    body.renderOnly .wrap { gap: 0; }
    body.renderOnly .page { margin: 0 auto; }
  </style>
</head>

<body>
  <div class="bar">
    <button type="button" id="backBtn">← Back to Inputs</button>
    <button type="button" onclick="window.print()">Print</button>

    <label style="display:flex;align-items:center;gap:8px">
      <input type="checkbox" id="toggleTools">
      Show mapping tools
    </label>

    <span class="meta">Navlog render page (auto-populates). Toggle tools only if you need remapping.</span>
  </div>

  <div class="wrap">
    <div class="panel">
      <div class="small">Mapping tools (optional). Turn on “Show mapping tools” to use these.</div>

      <div class="row">
        <button id="copyHudBtn" type="button">Copy HUD</button>
        <button id="pasteHudBtn" type="button">Paste HUD → Input</button>
      </div>

      <label>
        <input type="checkbox" id="autoCopy" />
        Auto-copy HUD after each drag
      </label>

      <textarea id="coordInput" placeholder="Paste TL/TR/BL/BR here..."></textarea>

      <div class="row">
        <button id="addBtn" type="button">Add Box</button>
        <button id="undoBtn" type="button">Undo Last</button>
        <button id="clearBtn" type="button">Clear All</button>
        <button id="copyBtn" type="button">Copy Boxes JSON</button>
      </div>

      <div class="small" style="margin-top:10px;">Saved boxes:</div>
      <div id="boxList" class="list"></div>
    </div>

    <div id="pages"></div>
  </div>

  <script type="module">
    import { loadPlan, savePlan } from "./js/plan/store.js";
    import { computeTodProfile } from "./js/perf/perfEngine.js";
    import { BOXES } from "./js/navlog/boxMap.js";

    // ✅ DevTools access (module-safe)
    window.__planStore = { loadPlan, savePlan };
    

    // Back button
    document.getElementById("backBtn").addEventListener("click", () => {
      window.location.href = "inputs.html";
    });

    // Tools ON by default
    document.body.classList.remove("renderOnly");
    const toggle = document.getElementById("toggleTools");
    toggle.checked = true;

    toggle.addEventListener("change", () => {
      if (toggle.checked) document.body.classList.remove("renderOnly");
      else document.body.classList.add("renderOnly");
    });

    const pct = (v) => (v * 100).toFixed(4) + "%";

    const ensureHud = () => {
      let box = document.getElementById("coordBox");
      if (!box) {
        box = document.createElement("div");
        box.id = "coordBox";
        document.body.appendChild(box);
      }
      return box;
    };
    const setHud = (text) => { ensureHud().textContent = text; };
    const getHud = () => ensureHud().textContent || "";

    async function copyText(text) {
      if (!text) return false;
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch {
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        ta.remove();
        return true;
      }
    }

    // Canvas pages (single page)
    const pagesEl = document.getElementById("pages");

    const PAGES = [];
    const PAGE_COUNT = 2;

    for (let p = 0; p < PAGE_COUNT; p++) {
      const pg = document.createElement("div");
      pg.className = "page";
      pg.dataset.page = String(p);
      pagesEl.appendChild(pg);
      PAGES.push(pg);
    }

    const boxes = BOXES;

    let ACTIVE_PAGE_INDEX = 0;

    function drawAllBoxes() {
      for (const pageEl of PAGES) {
        pageEl.querySelectorAll(".mappedBox").forEach(el => el.remove());

        const curPage = Number(pageEl.dataset.page);

        for (const b of boxes) {
          const bPage = Number.isFinite(Number(b.page)) ? Number(b.page) : 0;
          if (bPage !== curPage) continue;

          const d = document.createElement("div");
          d.className = "mappedBox";
          if (b.id) d.dataset.box = String(b.id).padStart(3, "0");

          d.style.left = pct(b.left);
          d.style.top = pct(b.top);
          d.style.width = pct(b.right - b.left);
          d.style.height = pct(b.bottom - b.top);

          const silentBoxes = new Set([
            "073","074","075","076","077","078","079","080",
            "081","082","083","084","085","086","087","088"
          ]);

          d.textContent = "";
          pageEl.appendChild(d);
        }
      }

      // keep boxList display (unchanged)
      const list = boxes.map((b, i) => {
        const tag = b.id ? String(b.id).padStart(3, "0") : String(i+1).padStart(3,"0");
        return `${tag}: left=${b.left.toFixed(4)} top=${b.top.toFixed(4)} right=${b.right.toFixed(4)} bottom=${b.bottom.toFixed(4)}`;
      }).join("\n");

      document.getElementById("boxList").textContent = list || "(none yet)";
    }

    function parseMostRecentTLTRBLBR(text) {
      const re = /TL:\s*x\s*=\s*([0-9]*\.?[0-9]+)\s*y\s*=\s*([0-9]*\.?[0-9]+)[\s\S]*?TR:\s*x\s*=\s*([0-9]*\.?[0-9]+)\s*y\s*=\s*([0-9]*\.?[0-9]+)[\s\S]*?BL:\s*x\s*=\s*([0-9]*\.?[0-9]+)\s*y\s*=\s*([0-9]*\.?[0-9]+)[\s\S]*?BR:\s*x\s*=\s*([0-9]*\.?[0-9]+)\s*y\s*=\s*([0-9]*\.?[0-9]+)/gi;

      let m, last = null;
      while ((m = re.exec(text)) !== null) last = m;
      if (!last) return null;

      const xs = [Number(last[1]), Number(last[3]), Number(last[5]), Number(last[7])];
      const ys = [Number(last[2]), Number(last[4]), Number(last[6]), Number(last[8])];

      const left = Math.min(...xs);
      const right = Math.max(...xs);
      const top = Math.min(...ys);
      const bottom = Math.max(...ys);

      if (![left,right,top,bottom].every(n => Number.isFinite(n))) return null;
      if (right <= left || bottom <= top) return null;

      return { left, top, right, bottom };
    }

    PAGES.forEach((pageEl, idx) => {
      pageEl.addEventListener("click", (e) => {
        ACTIVE_PAGE_INDEX = idx;

        const r = pageEl.getBoundingClientRect();
        const xPct = (e.clientX - r.left) / r.width;
        const yPct = (e.clientY - r.top) / r.height;

        setHud(`PAGE=${idx}\nx=${xPct.toFixed(4)}  y=${yPct.toFixed(4)}`);
      });
    });

    // Drag draw (enable on every page)
    PAGES.forEach((pageEl, idx) => {
      (function enableDragDrawBox(pageEl, idx) {
        let rectEl = null;
        let dragging = false;
        let startX = 0, startY = 0;

        function pctFromEvent(e) {
          const r = pageEl.getBoundingClientRect();
          const x = (e.clientX - r.left) / r.width;
          const y = (e.clientY - r.top) / r.height;
          return { x, y };
        }

        function setRect(left, top, right, bottom) {
          const l = Math.min(left, right);
          const t = Math.min(top, bottom);
          const r = Math.max(left, right);
          const b = Math.max(top, bottom);

          rectEl.style.left = pct(l);
          rectEl.style.top = pct(t);
          rectEl.style.width = pct(r - l);
          rectEl.style.height = pct(b - t);

          setHud(
            `PAGE=${idx}\n` +
            `TL: x=${l.toFixed(4)} y=${t.toFixed(4)}\n` +
            `TR: x=${r.toFixed(4)} y=${t.toFixed(4)}\n` +
            `BL: x=${l.toFixed(4)} y=${b.toFixed(4)}\n` +
            `BR: x=${r.toFixed(4)} y=${b.toFixed(4)}`
          );
        }

        pageEl.addEventListener("pointerdown", (e) => {
          if (e.button !== 0) return;
          ACTIVE_PAGE_INDEX = idx;

          if (rectEl) { rectEl.remove(); rectEl = null; }

          dragging = true;
          pageEl.setPointerCapture(e.pointerId);

          const p = pctFromEvent(e);
          startX = p.x;
          startY = p.y;

          rectEl = document.createElement("div");
          rectEl.className = "drawRect";
          pageEl.appendChild(rectEl);

          setRect(startX, startY, startX + 0.0001, startY + 0.0001);
          e.preventDefault();
        });

        pageEl.addEventListener("pointermove", (e) => {
          if (!dragging || !rectEl) return;
          const p = pctFromEvent(e);
          setRect(startX, startY, p.x, p.y);
        });

        pageEl.addEventListener("pointerup", async (e) => {
          if (!dragging) return;
          dragging = false;
          try { pageEl.releasePointerCapture(e.pointerId); } catch {}

          if (document.getElementById("autoCopy").checked) {
            await copyText(getHud());
          }
        });
      })(pageEl, idx);
    });

    // Buttons
    document.getElementById("copyHudBtn").addEventListener("click", async () => {
      const ok = await copyText(getHud());
      if (!ok) alert("Nothing in HUD yet. Drag a rectangle first.");
    });

    document.getElementById("pasteHudBtn").addEventListener("click", () => {
      const hud = getHud();
      if (!hud) return alert("HUD is empty. Drag a rectangle first.");
      document.getElementById("coordInput").value = hud;
    });

    document.getElementById("addBtn").addEventListener("click", () => {
      const inputEl = document.getElementById("coordInput");
      const txt = inputEl.value.trim();

      const box = parseMostRecentTLTRBLBR(txt);
      if (!box) {
        alert("Couldn't parse TL/TR/BL/BR. Make sure the text includes TL:, TR:, BL:, BR: lines.");
        return;
      }

      boxes.push({ ...box, page: ACTIVE_PAGE_INDEX });
      drawAllBoxes();
      inputEl.value = "";
      autopopulate();
    });

    document.getElementById("undoBtn").addEventListener("click", () => {
      boxes.pop();
      drawAllBoxes();
      autopopulate();
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      boxes.length = 0;
      drawAllBoxes();
    });

    document.getElementById("copyBtn").addEventListener("click", async () => {
      const json = JSON.stringify(boxes, null, 2);
      await copyText(json);
      alert("Copied boxes JSON to clipboard.");
    });

  function getBoxOnPage(pageIndex, id) {
  const key = String(id).padStart(3, "0");
  const pageEl = PAGES?.[pageIndex];
  if (!pageEl) return null;
  return pageEl.querySelector(`[data-box="${key}"]`);
}

  function setBoxTextOnEl(el, id, text) {
      if (!el) return;

      // boxes that should stay completely quiet
      const silentBoxes = new Set([73, 81]);

      if (silentBoxes.has(Number(id))) {
        el.textContent = "";
        el.style.color = "";
        return;
  }

  el.textContent = text ?? "";

  const nId = Number(id);

  // ✅ TOD header box (227): left-to-right and allow newline
  if (nId === 227) {
  el.style.whiteSpace = "pre-wrap";   // ✅ respects \n and wraps
  el.style.fontSize = "10px";
  el.style.fontWeight = "500";
  el.style.textAlign = "left";
  el.style.alignItems = "flex-start";
  el.style.justifyContent = "flex-start";
  el.style.lineHeight = "1.1";
  el.style.padding = "2px 3px";
}

  // ✅ ETA boxes (121–128): tweak however you want
  if (nId >= 121 && nId <= 128) {
    el.style.fontSize = "11px";
    el.style.fontWeight = "400";
    el.style.padding = "0";
    el.style.textAlign = "center";
    el.style.alignItems = "center";
    el.style.justifyContent = "center";
    el.style.lineHeight = "1";
    el.style.transform = "translateY(1px)";
  }
  // ✅ Fuel Remaining boxes (137–144): tweak however you want
  else if (nId >= 137 && nId <= 144) {
    el.style.fontSize = "11px";
    el.style.fontWeight = "400";
    el.style.padding = "0";
    el.style.textAlign = "center";
    el.style.alignItems = "center";
    el.style.justifyContent = "center";
    el.style.lineHeight = "1";
    el.style.transform = "translateY(1px)";
  }
  else {
    el.style.fontSize = "";
    el.style.fontWeight = "";
    el.style.padding = "";
    el.style.textAlign = "";
    el.style.alignItems = "";
    el.style.justifyContent = "";
    el.style.lineHeight = "";
    el.style.transform = "";
  }


}

// Page-aware writer
function setP(pageIndex, id, text) {
  const el = getBoxOnPage(pageIndex, id);
  setBoxTextOnEl(el, id, text);
}

// Convenience wrappers
const setP1 = (id, text) => setP(0, id, text);
const setP2 = (id, text) => setP(1, id, text);

// ✅ Backwards compatible (keeps ALL your existing code working)
function getBox(id) { return getBoxOnPage(0, id); }
function setBoxText(id, text) { return setP1(id, text); }
// ✅ Expose helpers to DevTools console (because this is a module script)
window.setP = setP;
window.setP1 = setP1;
window.setP2 = setP2;
window.getBoxOnPage = getBoxOnPage;

    function fmtNum(n, decimals = 1) {
      const x = Number(n);
      if (!Number.isFinite(x)) return "";
      return x.toFixed(decimals);
    }

    function norm360(deg) {
      const d = ((Number(deg) % 360) + 360) % 360;
      return Number.isFinite(d) ? d : 0;
    }

    function formatDeg3(d) {
      const n = Number(d);
      if (!Number.isFinite(n)) return "";
      return String(norm360(Math.round(n))).padStart(3, "0");
    }

    function norm180(deg) {
      let d = ((Number(deg) % 360) + 360) % 360;
      if (d > 180) d -= 360;
      return d; // -180..+180
    }

    function formatTAS(v) {
      const n = Number(v);
      if (!Number.isFinite(n)) return "";
      return String(Math.round(n)).padStart(3, "0");
    }

    function formatGPH(v) {
      const n = Number(v);
      if (!Number.isFinite(n)) return "";
      return (Math.round(n * 10) / 10).toFixed(1);
    }

    function parseHHMM(str) {
      const s = String(str || "").trim();
      const m = s.match(/^(\d{1,2}):(\d{2})$/);
      if (!m) return null;
      const hh = Number(m[1]), mm = Number(m[2]);
      if (!Number.isFinite(hh) || !Number.isFinite(mm)) return null;
      if (hh < 0 || hh > 23 || mm < 0 || mm > 59) return null;
      return hh * 60;
    }

    function formatHHMM(totalMinutes) {
      if (!Number.isFinite(totalMinutes)) return "";
      let m = Math.round(totalMinutes);
      m = ((m % (24 * 60)) + (24 * 60)) % (24 * 60);
      const hh = Math.floor(m / 60);
      const mm = m % 60;
      return String(hh).padStart(2, "0") + ":" + String(mm).padStart(2, "0");
    }

function isLegInClimb(i, plan) {
  const env = plan?.env || {};
  const legs = Array.isArray(plan?.legs) ? plan.legs : [];

  // ✅ total POH climb time (this MUST come from inputs.html)
  const climbTotalMin = Number(env.climbTimeMin);

  // If we don't have POH climb time, fall back to "no climb"
  if (!Number.isFinite(climbTotalMin) || climbTotalMin <= 0) return false;

  // If TOC is before first fix, then all route legs are cruise legs
  if (!!env.tocBeforeFirstFix) return false;

  const fixDist = Number(env.firstFixDistNm);
  const tocDist = Number(env.climbDistWindNm);

  if (!Number.isFinite(fixDist) || fixDist < 0) return false;
  if (!Number.isFinite(tocDist) || tocDist <= 0) return false;

  // Portion of climb completed by the time you reach the first fix
  const fracToFix = Math.max(0, Math.min(1, fixDist / tocDist));
  const climbToFixMin = climbTotalMin * fracToFix;

  // Remaining climb time available during legs (after first fix)
  let climbRemainingMin = Math.max(0, climbTotalMin - climbToFixMin);

  // Walk legs in order, burning climbRemainingMin until it hits 0
  for (let k = 0; k < legs.length; k++) {
    const dist = Number(legs[k]?.distNm ?? 0);
    const tc   = Number(legs[k]?.tcDeg ?? NaN);
    if (!Number.isFinite(dist) || dist <= 0 || !Number.isFinite(tc)) continue;

    // Your climb TAS convention
    const tas = 74;

    // Midpoint distance-from-departure for wind sampling:
    // dep->firstFix + prior legs + half of this leg
    let distFromDep = fixDist;
    for (let j = 0; j < k; j++) distFromDep += Number(legs[j]?.distNm ?? 0);
    distFromDep += dist / 2;

    const w = windAtClimbDistance(env, distFromDep);
    const gs = computeGsKt(tc, tas, Number(w.windFrom), Number(w.windKt));

    const legTimeMin =
      (Number.isFinite(gs) && gs > 0) ? (dist / gs) * 60 : 0;

    // If we're asking about THIS leg, it's a climb leg if climb time remains
    if (k === i) return climbRemainingMin > 0;

    // Otherwise consume time and continue
    climbRemainingMin -= legTimeMin;
    if (climbRemainingMin <= 0) return false;
  }

  return false;
}

    function tasForLeg(i, plan) {
      if (isLegInClimb(i, plan)) return 74;
      const cruise = Number(plan?.env?.cruiseTasKt);
      return Number.isFinite(cruise) ? cruise : NaN;
    }

function windsForSegment({ kind, i, env, plan }) {
  // Row 1 uses surface wind
  if (kind === "row1") {
    return {
      windFrom: Number(env.surfaceWindFromDeg ?? 0),
      windKt: Number(env.surfaceWindKt ?? 0)
    };
  }

  // Row 2:
  // - If TOC is before first fix => row 2 is cruise, use cruise wind (fallback to surface if missing)
  // - Else row 2 is still climb, sample wind by distance
  if (kind === "row2") {
    if (!!env.tocBeforeFirstFix) {
      const wf = Number.isFinite(Number(env.windFromDeg))
        ? Number(env.windFromDeg)
        : Number(env.surfaceWindFromDeg ?? 0);

      const wk = Number.isFinite(Number(env.windKt))
        ? Number(env.windKt)
        : Number(env.surfaceWindKt ?? 0);

      return { windFrom: wf, windKt: wk };
    } else {
      const distStart = Number(env.firstFixDistNm);
      const distMid = Number.isFinite(distStart)
        ? distStart + (Number(env.row2DistNm ?? 0) / 2)
        : distStart;

      const w = windAtClimbDistance(env, distMid);
      return { windFrom: Number(w.windFrom), windKt: Number(w.windKt) };
    }
  }

  // Rows 3+:
  // - If leg is in climb, use interpolated avg-alt wind
  // - Else cruise wind (fallback to surface if missing)
  if (kind === "row3plus") {
    if (isLegInClimb(i, plan)) {
      const avg = computeAvgAltEnvironment(env);
      return {
        windFrom: Number(avg?.windFromDeg ?? env.surfaceWindFromDeg ?? 0),
        windKt: Number(avg?.windKt ?? env.surfaceWindKt ?? 0)
      };
    }

    const wf = Number.isFinite(Number(env.windFromDeg))
      ? Number(env.windFromDeg)
      : Number(env.surfaceWindFromDeg ?? 0);

    const wk = Number.isFinite(Number(env.windKt))
      ? Number(env.windKt)
      : Number(env.surfaceWindKt ?? 0);

    return { windFrom: wf, windKt: wk };
  }

  // Default fallback
  return {
    windFrom: Number(env.surfaceWindFromDeg ?? 0),
    windKt: Number(env.surfaceWindKt ?? 0)
  };
}
    function computeGsKt(tcDeg, tasKt, windFromDeg, windKt) {
      const tc = Number(tcDeg);
      const tas = Number(tasKt);
      const wf = Number(windFromDeg);
      const wk = Number(windKt);

      if (![tc, tas, wf, wk].every(Number.isFinite)) return NaN;

      const delta = norm180(wf - tc);
      const headwind = wk * Math.cos(delta * Math.PI / 180);

      return tas - headwind;
    }

    function computeWcaSignedDeg(tcDeg, windFromDeg, windKt, tasKt) {
      const tc = Number(tcDeg);
      const wf = Number(windFromDeg);
      const wk = Number(windKt);
      const tas = Number(tasKt);

    .filter(p => Number.isFinite(p.altFt) && Number.isFinite(p.tempC))

            from: "TOC",
            distNm: b,
            _origIndex: original._origIndex,
            _phase: "cruise"
          };

          out.splice(i, 1, legA, legB);

  if (tocBefore) {

  }

  // ✅ 2) TOD split (your existing logic)

  if (tod?.ok) {

      };

      const legB = {
        ...original,

    ) {

      firstFixAltFt = fieldElevFt + (cruiseAltFt - fieldElevFt) * f;
    }
  }

  env.firstFixAltFt = Number.isFinite(firstFixAltFt) ? Math.round(firstFixAltFt) : NaN;

  const alt145 = tocBefore ? Number(env.cruiseAltFt) : Number(env.firstFixAltFt);
  const alt145Txt = Number.isFinite(alt145) ? String(Math.round(alt145)) : "";

  setP1(145, alt145Txt);
  setP1(146, Number.isFinite(cruiseAltFt) ? String(Math.round(cruiseAltFt)) : "");
  

// -----------------------------
// ✅ TOD altitude override for final segment(s)
// Boxes 147–152 correspond to page 1 rows 3–8 (displayLegs[0..5])
// -----------------------------
const destTpaFt = Number(env.destTpaFt);
const todOk = !!env.tod?.ok && Number.isFinite(destTpaFt);

// Find where the "after TOD" segment begins inside displayLegs
const todStartIndex = todOk
  ? displayLegs.findIndex(l => String(l?.from || "").trim().toUpperCase() === "TOD")
  : -1;

function altForDisplayLegIndex(displayLegIndex) {
  const leg = displayLegs?.[displayLegIndex];

    // ✅ If this row does not correspond to a real leg, leave blank
  if (!leg || !Number.isFinite(leg.distNm) || leg.distNm <= 0) {
    return "";
  }


  // Default behavior: cruise altitude
  if (!Number.isFinite(cruiseAltFt)) return "";
  let alt = cruiseAltFt;

  const destIcao = String(env.destIcao || "").trim().toUpperCase();
  const toIcao   = String(leg?.to || "").trim().toUpperCase();
  const fromIcao = String(leg?.from || "").trim().toUpperCase();

  // ✅ 1) Only force TPA on the FINAL leg that actually goes TO the destination
  if (todOk && Number.isFinite(destTpaFt) && destIcao && toIcao === destIcao) {
    return String(Math.round(destTpaFt));
  }

  // ✅ 2) If no TOD marker exists, just show cruise
  if (!(todOk && todStartIndex >= 0)) {
    return String(Math.round(alt));
  }

  // ✅ 3) BEFORE TOD => cruise
  if (displayLegIndex < todStartIndex) {
    return String(Math.round(alt));
  }

  // ✅ 4) AFTER TOD => estimate altitude at the END of this leg (arrival at next fix)
  let distFromTodNm = 0;
  for (let i = todStartIndex; i <= displayLegIndex; i++) {
    const d = Number(displayLegs?.[i]?.distNm);
    if (Number.isFinite(d)) distFromTodNm += d;
  }

  // Simple deterministic descent model:
  // ft per NM = 60 * VS / GS
  const vsFpm = 500;
  const gsKt  = 90;
  const ftPerNm = (60 * Math.abs(vsFpm)) / Math.max(1, gsKt);

  alt = cruiseAltFt - (ftPerNm * distFromTodNm);

  // Don’t go below TPA if we have it
  if (Number.isFinite(destTpaFt)) alt = Math.max(destTpaFt, alt);

  return Number.isFinite(alt) ? String(Math.round(alt)) : "";
}

// Page 1 rows 3–8 => boxes 147–152 map to displayLegs[0..5]
for (let r = 0; r < 6; r++) {
  const boxId = 147 + r;     // 147..152
  const txt = altForDisplayLegIndex(r);
  setP1(boxId, txt);
}

// Page 2 rows 1–8 => boxes 145–152 map to displayLegs[6..13]
if (POPULATE_PAGE2) {
  for (let r = 0; r < 8; r++) {
    const boxId = 145 + r;         // 145..152
    const displayIndex = 6 + r;    // page2 rows map to displayLegs[6..13]
    const leg = displayLegs?.[displayIndex];

    // ✅ No leg => leave altitude blank
    if (!leg) {
      setP2(boxId, "");
      continue;
    }

    setP2(boxId, altForDisplayLegIndex(displayIndex));
  }
}
// -----------------------------
// ROW 1 headings (boxes 33/41/49/57/65 + TAS box 25)
// Use climb-interpolated wind at mid-climb distance (NOT raw surface wind)
// -----------------------------
{
  const tc = Number(env.firstFixTcDeg ?? displayLegs?.[0]?.tcDeg ?? NaN);
  const tcOk = Number.isFinite(tc);

  const tasKt = 74;

  // Row1 distance: dep->TOC if tocBefore, else dep->firstFix
  let row1DistLocal = Number(env.climbDistWindNm);
  if (!tocBefore && Number.isFinite(fixDist)) row1DistLocal = fixDist;

  const distMid = Number.isFinite(row1DistLocal) ? (row1DistLocal / 2) : 0;
  const w = windAtClimbDistance(env, distMid);

  const windFromDeg = Number(w.windFrom);
  const windKt      = Number(w.windKt);

  const wcaDeg = tcOk ? computeWcaSignedDeg(tc, windFromDeg, windKt, tasKt) : 0;
  const wcaToken = tcOk ? (formatWcaToken(wcaDeg) || "0") : "";

  const th = tcOk ? norm360(tc + wcaDeg) : NaN;
  const varToken = formatVarTokenFromPlan(plan);
  const mh = tcOk ? applyVariationToTH(th, plan) : NaN;

  setP1(33, tcOk ? formatDeg3(tc) : "");
  setP1(41, wcaToken);
  setP1(49, Number.isFinite(th) ? formatDeg3(th) : "");
  setP1(57, varToken);
  setP1(65, Number.isFinite(mh) ? formatDeg3(mh) : "");
  setP1(25, formatTAS(tasKt));
}

// -----------------------------
// ROW 1 climb performance (winds/dist/gs/time/fuel/eta)
// -----------------------------
let row1Dist = Number(env.climbDistWindNm);
if (!tocBefore && Number.isFinite(fixDist)) row1Dist = fixDist;

const tc1 = Number(
  env.firstFixTcDeg ?? displayLegs?.[0]?.tcDeg ?? NaN
);
const tas1 = 74;

// Keep wind display boxes (001/009) as a “representative” climb wind
const distMid1 = Number.isFinite(row1Dist) ? (row1Dist / 2) : 0;
const w1 = windAtClimbDistance(env, distMid1);
const windFrom1 = Number(w1.windFrom);
const windKt1   = Number(w1.windKt);

setP1(1, Number.isFinite(windFrom1) ? formatDeg3(windFrom1) : "");
setP1(9, Number.isFinite(windKt1) ? String(Math.round(windKt1)) : "");

// Distance
setP1(89, Number.isFinite(row1Dist) ? fmtNum(row1Dist, 1) : "");

// ✅ POH portion for row1 distance
const p1 = pohClimbPortion(row1Dist);
const time1 = p1.ok ? p1.timeMin : NaN;

// ✅ GS must be consistent with distance + POH time (average GS)
const gs1 =
  (Number.isFinite(row1Dist) && Number.isFinite(time1) && time1 > 0)
    ? (row1Dist / time1) * 60
    : NaN;

setP1(105, Number.isFinite(gs1) ? String(Math.round(gs1)) : "");
setP1(113, Number.isFinite(time1) ? fmtNum(time1, 1) : "");

if (Number.isFinite(time1)) elapsedMin += time1;
setP1(121, (timeOffMin == null) ? "" : formatHHMM(timeOffMin + elapsedMin));

// Fuel: POH first, fallback to GPH
let fuel1 = p1.ok ? p1.fuelGal : NaN;
if (!Number.isFinite(fuel1)) {
  const climbGph = Number(env.climbGph ?? env.cruiseGph);
  fuel1 =
    (Number.isFinite(time1) && Number.isFinite(climbGph))
      ? (time1 / 60) * climbGph
      : NaN;
}

setP1(129, Number.isFinite(fuel1) ? fmtNum(fuel1, 2) : "");
setFuelRemaining(0, 0, fuel1);

  // -----------------------------
  // ROW 2 (either cruise or continued climb)
  // -----------------------------
  let row2Dist = NaN;
  if (Number.isFinite(fixDist) && Number.isFinite(tocDist)) {
    row2Dist = tocBefore ? Math.max(0, fixDist - tocDist) : Math.max(0, tocDist - fixDist);
  }

// -----------------------------
// ROW 2 (either cruise or continued climb)
// -----------------------------

setP1(90, Number.isFinite(row2Dist) ? fmtNum(row2Dist, 1) : "");

let tas2, windFrom2, windKt2, gph2;

if (tocBefore) {
  // Row 2 is CRUISE (TOC -> first fix)
  tas2 = Number(env.cruiseTasKt);
  windFrom2 = Number(env.windFromDeg);
  windKt2   = Number(env.windKt);
  gph2      = Number(env.cruiseGph);
} else {
  // Row 2 is STILL CLIMB (first fix -> TOC)
  tas2 = 74;

  const distStart2 = Number(env.firstFixDistNm);
  const distMid2 =
    Number.isFinite(distStart2) && Number.isFinite(row2Dist)
      ? distStart2 + (row2Dist / 2)
      : distStart2;

  const w2 = windAtClimbDistance(env, distMid2);
  windFrom2 = Number(w2.windFrom);
  windKt2   = Number(w2.windKt);

  gph2 = Number(env.climbGph ?? env.cruiseGph);
}

// Wind + TAS boxes for row 2
setP1(2,  Number.isFinite(windFrom2) ? formatDeg3(windFrom2) : "");
setP1(10, Number.isFinite(windKt2) ? String(Math.round(windKt2)) : "");
setP1(26, formatTAS(tas2));

// GS for row 2 (your existing model)
const gs2 = computeGsKt(tc1, tas2, windFrom2, windKt2);
setP1(106, Number.isFinite(gs2) ? String(Math.round(gs2)) : "");

// ✅ NEW: Compute row 2 headings (TC/WCA/TH/VAR/MH) instead of copying row 1
{
  const tc2 = tc1;
  const tc2Ok = Number.isFinite(tc2);

  const wca2 = tc2Ok ? computeWcaSignedDeg(tc2, windFrom2, windKt2, tas2) : 0;
  const th2  = tc2Ok ? norm360(tc2 + wca2) : NaN;

  const varTok2 = formatVarTokenFromPlan(plan);
  const mh2 = Number.isFinite(th2) ? applyVariationToTH(th2, plan) : NaN;

  setP1(34, tc2Ok ? formatDeg3(tc2) : "");
  setP1(42, tc2Ok ? (formatWcaToken(wca2) || "0") : "");
  setP1(50, Number.isFinite(th2) ? formatDeg3(th2) : "");
  setP1(58, varTok2);
  setP1(66, Number.isFinite(mh2) ? formatDeg3(mh2) : "");
}

// ✅ REPLACEMENT STARTS HERE
let time2 = NaN;
let fuel2 = NaN;

if (!tocBefore) {
  // Row 2 is STILL CLIMB (first fix -> TOC)
  const p2 = pohClimbPortion(row2Dist);
  time2 = p2.ok ? p2.timeMin : NaN;
  fuel2 = p2.ok ? p2.fuelGal : NaN;

  // If POH fuel missing, fallback to climbGPH
  if (!Number.isFinite(fuel2)) {
    const climbGph = Number(env.climbGph ?? env.cruiseGph);
    fuel2 =
      (Number.isFinite(time2) && Number.isFinite(climbGph))
        ? (time2 / 60) * climbGph
        : NaN;
  }
} else {
  // Row 2 is CRUISE (TOC -> first fix)
  time2 =
    (Number.isFinite(row2Dist) && Number.isFinite(gs2) && gs2 > 0)
      ? (row2Dist / gs2) * 60
      : NaN;

  const gph2 = Number(env.cruiseGph);
  fuel2 =
    (Number.isFinite(time2) && Number.isFinite(gph2))
      ? (time2 / 60) * gph2
      : NaN;
}

setP1(114, Number.isFinite(time2) ? fmtNum(time2, 1) : "");
if (Number.isFinite(time2)) elapsedMin += time2;
setP1(122, (timeOffMin == null) ? "" : formatHHMM(timeOffMin + elapsedMin));

  setP1(130, Number.isFinite(fuel2) ? fmtNum(fuel2, 2) : "");
  setFuelRemaining(0, 1, fuel2);

  // -----------------------------
  // ROWS 3–8 PAGE 1: plan.legs[0..5]
  // -----------------------------

  // -----------------------------
  // ✅ Trip total + distance remaining (uses what YOU print on the navlog)
  // Page 1: Row1 box 89, Row2 box 90, Rows3–8 boxes 91–96
  // Remaining boxes: 97–104, Total box: 188
  // -----------------------------
  const distRowsP1 = new Array(8).fill(NaN);

  // Row 1 distance (box 89) and row 2 distance (box 90) already computed above
  distRowsP1[0] = Number(row1Dist);  // row 1
  distRowsP1[1] = Number(row2Dist);  // row 2

  for (let r = 0; r < 6; r++) {
    const leg = displayLegs?.[r];
    if (!leg) continue;

    const origIdx = Number.isFinite(Number(leg._origIndex)) ? Number(leg._origIndex) : r;

    const tc = Number(leg.tcDeg);
    const dist = Number(leg.distNm);
    distRowsP1[2 + r] = dist; // rows 3–8
    const tcOk = Number.isFinite(tc);

    const inClimb = isClimbDisplayLeg(r);
    const tas = tasForDisplayLeg(r);

    const w = windsForDisplayLeg(r);
    const windFrom = Number(w.windFrom);
    const windKt = Number(w.windKt);

    // wind/temp boxes row3+ ids: 3..8, 11..16, 19..24
    setP1(3 + r,  Number.isFinite(windFrom) ? formatDeg3(windFrom) : "");
    setP1(11 + r, Number.isFinite(windKt) ? String(Math.round(windKt)) : "");

    const tempRowC = inClimb
      ? Number(computeAvgAltEnvironment(env)?.tempC)
      : Number(env.tempCruiseC ?? computeAvgAltEnvironment(env)?.tempC);

    setP1(19 + r, Number.isFinite(tempRowC) ? String(Math.round(tempRowC)) : "");

    const wca = tcOk ? computeWcaSignedDeg(tc, windFrom, windKt, tas) : 0;
    const th = tcOk ? norm360(tc + wca) : NaN;
    const varTok = formatVarTokenFromPlan(plan);
    const mh = tcOk ? applyVariationToTH(th, plan) : NaN;

    setP1(35 + r, tcOk ? formatDeg3(tc) : "");
    setP1(43 + r, tcOk ? formatWcaToken(wca) : "");
    setP1(51 + r, Number.isFinite(th) ? formatDeg3(th) : "");
    setP1(59 + r, varTok);
    setP1(67 + r, Number.isFinite(mh) ? formatDeg3(mh) : "");
    setP1(27 + r, formatTAS(tas));
    setP1(91 + r, Number.isFinite(dist) ? fmtNum(dist, 1) : "");

    const gs = computeGsKt(tc, tas, windFrom, windKt);
    setP1(107 + r, Number.isFinite(gs) ? String(Math.round(gs)) : "");

    const timeMin =
      (Number.isFinite(dist) && Number.isFinite(gs) && gs > 0)
        ? (dist / gs) * 60
        : NaN;

    setP1(115 + r, Number.isFinite(timeMin) ? fmtNum(timeMin, 1) : "");

    if (Number.isFinite(timeMin)) elapsedMin += timeMin;
    setP1(123 + r, (timeOffMin == null) ? "" : formatHHMM(timeOffMin + elapsedMin));

    const gph = inClimb ? Number(env.climbGph ?? env.cruiseGph) : Number(env.cruiseGph);
    const fuelGal =
      (Number.isFinite(timeMin) && Number.isFinite(gph))
        ? (timeMin / 60) * gph
        : NaN;

    setP1(131 + r, Number.isFinite(fuelGal) ? fmtNum(fuelGal, 2) : "");
    setFuelRemaining(0, 2 + r, fuelGal);
  }

// -----------------------------
// ✅ Trip Total for Box 188 = SUM OF ALL LEG DISTANCES (route legs only)
// No TOC/TOD dependency, no row1/row2 dependency.
// -----------------------------
{
  // ✅ Sum route legs (what you already do)
  const legs = Array.isArray(plan?.legs) ? plan.legs : [];
  const legsTotal = legs
    .map(l => Number(l?.distNm))
    .filter(d => Number.isFinite(d) && d > 0)
    .reduce((a, b) => a + b, 0);

  // ✅ Add Row 1 + Row 2 distances that your navlog already computes
  const r1 = Number(row1Dist);
  const r2 = Number(row2Dist);

  const row1 = (Number.isFinite(r1) && r1 > 0) ? r1 : 0;
  const row2 = (Number.isFinite(r2) && r2 > 0) ? r2 : 0;

  const total = row1 + row2 + legsTotal;

  setP1(188, total > 0 ? fmtNum(total, 1) : "");
}
  // -----------------------------
  // PAGE 2 rows 1–8: route legs only (cruise-only)
  // plan.legs[6..13] -> page2 rows 1..8 (33..40 etc)
  // -----------------------------
  if (POPULATE_PAGE2) {
  for (let r = 0; r < 8; r++) {
    const legIndex = 6 + r;
    const leg = displayLegs?.[legIndex];
    if (!leg) continue;

    const tc = Number(leg.tcDeg);
    const dist = Number(leg.distNm);
    const tcOk = Number.isFinite(tc);

    const tas = Number(env.cruiseTasKt);
    const windFrom = Number(env.windFromDeg ?? 0);
    const windKt = Number(env.windKt ?? 0);

    // wind/temp boxes on page2 for rows 1..8 use ids 1..8, 9..16, 17..24
    // but NOTE: your page2 row1 wind boxes are id 001/009/017, etc (same ids as page1)
    setP2(1 + r,  Number.isFinite(windFrom) ? formatDeg3(windFrom) : "");
    setP2(9 + r,  Number.isFinite(windKt) ? String(Math.round(windKt)) : "");
    const tC = Number(env.tempCruiseC ?? computeAvgAltEnvironment(env)?.tempC);
    setP2(17 + r, Number.isFinite(tC) ? String(Math.round(tC)) : "");

    const wca = tcOk ? computeWcaSignedDeg(tc, windFrom, windKt, tas) : 0;
    const th = tcOk ? norm360(tc + wca) : NaN;
    const varTok = formatVarTokenFromPlan(plan);
    const mh = tcOk ? applyVariationToTH(th, plan) : NaN;

    // page2 headings table row mapping uses the same ids as page1
    setP2(33 + r, tcOk ? formatDeg3(tc) : "");
    setP2(41 + r, tcOk ? formatWcaToken(wca) : "");
    setP2(49 + r, Number.isFinite(th) ? formatDeg3(th) : "");
    setP2(57 + r, varTok);
    setP2(65 + r, Number.isFinite(mh) ? formatDeg3(mh) : "");
    setP2(25 + r, formatTAS(tas));
    setP2(89 + r, Number.isFinite(dist) ? fmtNum(dist, 1) : "");

    const gs = computeGsKt(tc, tas, windFrom, windKt);
    setP2(105 + r, Number.isFinite(gs) ? String(Math.round(gs)) : "");

    const timeMin =
      (Number.isFinite(dist) && Number.isFinite(gs) && gs > 0)
        ? (dist / gs) * 60
        : NaN;

    setP2(113 + r, Number.isFinite(timeMin) ? fmtNum(timeMin, 1) : "");

    if (Number.isFinite(timeMin)) elapsedMin += timeMin;
    setP2(121 + r, (timeOffMin == null) ? "" : formatHHMM(timeOffMin + elapsedMin));

    const gph = Number(env.cruiseGph);
    const fuelGal =
      (Number.isFinite(timeMin) && Number.isFinite(gph))
        ? (timeMin / 60) * gph
        : NaN;

    setP2(129 + r, Number.isFinite(fuelGal) ? fmtNum(fuelGal, 2) : "");
    setFuelRemaining(1, r, fuelGal); // page2 remaining rows 0..7
  }
}

// Force box 017 (page1) to surface OAT (you had this rule)
setP1(17, Number.isFinite(Number(env.oatC)) ? String(Math.round(Number(env.oatC))) : "");

// -----------------------------
// TEMPERATURES (Page 1 + Page 2)
// -----------------------------

// Aloft temp (prefer env.tempCruiseC, else compute from aloftPts)
const cruiseAlt = Number(env?.cruiseAltFt);

const aloftTC = (Number.isFinite(cruiseAlt) && cruiseAlt < 6000)
  ? tempAtAltFromSurfaceAnd6000(env, cruiseAlt)
  : getCruiseTempC(env);

const aloftText = Number.isFinite(aloftTC) ? String(Math.round(aloftTC)) : "";

// Page 1: Rows 2–8 (018–024) = aloft only
// Page 1: Row 2 (box 018) = aloft always
setP1(18, aloftText);

// Page 1: Rows 3–8 (boxes 019–024) = aloft ONLY if that route leg exists
for (let r = 2; r < 8; r++) {
  const leg = displayLegs?.[r - 2];   // rows 3–8 map to displayLegs[0..5]
  setP1(17 + r, leg ? aloftText : "");
}

// Page 2: Rows 1–8 (017–024) = aloft only — but ONLY if that row exists
if (POPULATE_PAGE2) {
  for (let r = 0; r < 8; r++) {
    const leg = displayLegs?.[6 + r];     // page2 row r corresponds to displayLegs[6+r]
    setP2(17 + r, leg ? aloftText : "");  // no leg => leave blank
  }
}

savePlan(plan);
}
    window.addEventListener("focus", autopopulate);

    // INIT
    try {
      setHud("Drag to measure a box...");
      drawAllBoxes();
      autopopulate();
    } catch (err) {
      console.error("INIT ERROR:", err);
      alert("Navlog init error — check console.");
    }
  </script>
</body>
</html>
