<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Navlog Prototype – Nav Log</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>

body { font-family: Arial, Helvetica, sans-serif; margin:24px; }

.bar{
display:flex;
gap:12px;
align-items:center;
flex-wrap:wrap;
margin-bottom:12px;
}

button{
padding:8px 14px;
border-radius:8px;
border:1px solid #999;
background:#f2f2f2;
cursor:pointer;
}

button:hover{ background:#e6e6e6; }

.meta{ font-size:13px;color:#555; }

.wrap{ display:flex; gap:16px; align-items:flex-start; }

.panel{
width:380px;
border:1px solid #ddd;
border-radius:10px;
padding:12px;
background:#fafafa;
}

#pages{
display:flex;
flex-direction:column;
gap:18px;
}

.page{
width:11in;
height:8.5in;
position:relative;
background-image:url("navlog_form.png");
background-size:contain;
background-repeat:no-repeat;
background-position:center;
border:1px solid #ddd;
overflow:hidden;
}

.mappedBox{
position:absolute;
pointer-events:none;
z-index:5000;
box-sizing:border-box;
display:flex;
align-items:flex-start;
justify-content:flex-start;
padding:2px 3px;
font-family:Arial, Helvetica, sans-serif;
font-size:12px;
color:black;
background:transparent;
}

</style>
</head>

<body>

<div class="bar">

<button id="backBtn">← Back to Inputs</button>
<button onclick="window.print()">Print</button>

<span class="meta">
Navlog render page (auto-populates)
</span>

</div>

<div id="pages"></div>

<script type="module">

import { loadPlan } from "./js/plan/store.js";
import { BOXES } from "./js/navlog/boxmap.js";

const pagesEl = document.getElementById("pages")

const PAGES = []
const PAGE_COUNT = 2

for(let p=0;p<PAGE_COUNT;p++){

const pg=document.createElement("div")
pg.className="page"
pg.dataset.page=String(p)

pagesEl.appendChild(pg)

PAGES.push(pg)

}

function pct(v){
return (v*100).toFixed(4)+"%"
}

function drawAllBoxes(){

for(const pageEl of PAGES){

pageEl.querySelectorAll(".mappedBox").forEach(el=>el.remove())

const curPage=Number(pageEl.dataset.page)

for(const b of BOXES){

const bPage=Number.isFinite(Number(b.page))?Number(b.page):0

if(bPage!==curPage) continue

const d=document.createElement("div")

d.className="mappedBox"

if(b.id) d.dataset.box=String(b.id).padStart(3,"0")

d.style.left=pct(b.left)
d.style.top=pct(b.top)
d.style.width=pct(b.right-b.left)
d.style.height=pct(b.bottom-b.top)

pageEl.appendChild(d)

}

}

}

function getBoxOnPage(page,id){

const key=String(id).padStart(3,"0")

const pageEl=PAGES[page]

if(!pageEl) return null

return pageEl.querySelector(`[data-box="${key}"]`)

}

function setBox(page,id,text){

const el=getBoxOnPage(page,id)

if(!el) return

el.textContent=text??""

}

function setP1(id,text){ setBox(0,id,text) }
function setP2(id,text){ setBox(1,id,text) }

function fmt(n,d=1){

const x=Number(n)

if(!Number.isFinite(x)) return ""

return x.toFixed(d)

}

function autopopulate(){

const plan=loadPlan()

if(!plan || !plan.env){
console.warn("No plan loaded")
return
}

const env=plan.env

console.log("NAVLOG POPULATE",env)


// --------------------------------
// proof of life
// --------------------------------

setP1(211,"POP OK")


// --------------------------------
// departure
// --------------------------------

setP1(211,String(env.depIcao||"").toUpperCase())


// --------------------------------
// checkpoints
// --------------------------------

setP1(212,String(env.cp2||"").toUpperCase())
setP1(213,String(env.cp3||"").toUpperCase())


// --------------------------------
// climb summary
// --------------------------------

setP1(214,fmt(env.climbTimeMin,1))
setP1(215,fmt(env.climbFuelGal,2))
setP1(216,fmt(env.climbDistWindNm??env.climbDistStillAirNm,1))


// --------------------------------
// cruise TAS
// --------------------------------

setP1(25,fmt(env.cruiseTasKt,0))


// --------------------------------
// magnetic variation
// --------------------------------

if(env.magVarDeg){

const dir=String(env.magVarDir||"").toUpperCase()

const sign=(dir==="E")?"-":"+"

setP1(57,sign+String(env.magVarDeg).padStart(2,"0"))

}


// --------------------------------
// trip distance
// --------------------------------

setP1(188,fmt(env.tripTotalNm,1))


console.log("NAVLOG populated")

}

window.autopopulate=autopopulate


document.getElementById("backBtn").onclick=()=>{
window.location.href="inputs.html"
}

window.addEventListener("focus",autopopulate)

window.addEventListener("DOMContentLoaded",()=>{

drawAllBoxes()

autopopulate()

})

</script>

</body>
</html>
