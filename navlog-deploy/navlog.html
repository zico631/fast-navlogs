<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Navlog Prototype – Nav Log</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 24px; }
    .bar { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
    button { padding:8px 14px; border-radius:8px; border:1px solid #999; background:#f2f2f2; cursor: pointer; }
    button:hover { background: #e6e6e6; }
    .meta { font-size:13px; color:#555; }

    .wrap { display:flex; gap:16px; align-items:flex-start; }

    #pages { display:flex; flex-direction:column; gap:18px; }
    .page {
      width: 11in;
      height: 8.5in;
      position: relative;
      background-image: url("navlog_form.png");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      border: 1px solid #ddd;
      overflow: hidden;
    }

    .mappedBox{
      position: absolute;
      pointer-events: none;
      z-index: 5000;
      box-sizing: border-box;

      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 2px 3px;

      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;

      color: black;
      font-weight: 400;
      text-shadow: none;

      background: transparent;
      outline: none;
    }

    @media print {
      .bar, #coordBox { display:none; }
      body { margin:0; }
      .page { border:none; page-break-after:always; }
      #pages { gap:0; }
      .mappedBox { outline: none; background: transparent; color: transparent; text-shadow:none; }
    }
  </style>
</head>

<body>
  <div class="bar">
    <button type="button" id="backBtn">← Back to Inputs</button>
    <button type="button" onclick="window.print()">Print</button>
    <span class="meta">Navlog — auto-populates from your inputs.</span>
  </div>

  <div class="wrap">
    <div id="pages"></div>
  </div>

  <script type="module">
    import { loadPlan, savePlan } from "./js/plan/store.js";
    import { computeTodProfile } from "./js/perf/perfengine.js";
    import { BOXES } from "./js/navlog/boxmap.js";

    // ✅ DevTools access (module-safe)
    window.__planStore = { loadPlan, savePlan };

    // Back button
    document.getElementById("backBtn").addEventListener("click", () => {
      window.location.href = "inputs.html";
    });

    const pct = (v) => (v * 100).toFixed(4) + "%";

    // Canvas pages (single page)
    const pagesEl = document.getElementById("pages");

    const PAGES = [];
    const PAGE_COUNT = 2;

    for (let p = 0; p < PAGE_COUNT; p++) {
      const pg = document.createElement("div");
      pg.className = "page";
      pg.dataset.page = String(p);
      pagesEl.appendChild(pg);
      PAGES.push(pg);
    }

    const boxes = BOXES;

    function drawAllBoxes() {
      for (const pageEl of PAGES) {
        pageEl.querySelectorAll(".mappedBox").forEach(el => el.remove());

        const curPage = Number(pageEl.dataset.page);

        for (const b of boxes) {
          const bPage = Number.isFinite(Number(b.page)) ? Number(b.page) : 0;
          if (bPage !== curPage) continue;

          const d = document.createElement("div");
          d.className = "mappedBox";
          if (b.id) d.dataset.box = String(b.id).padStart(3, "0");

          d.style.left = pct(b.left);
          d.style.top = pct(b.top);
          d.style.width = pct(b.right - b.left);
          d.style.height = pct(b.bottom - b.top);

          d.textContent = "";
          pageEl.appendChild(d);
        }
      }
    }

  function getBoxOnPage(pageIndex, id) {
    const key = String(id).padStart(3, "0");
    const pageEl = PAGES?.[pageIndex];
    if (!pageEl) return null;
    return pageEl.querySelector(`[data-box="${key}"]`);
  }

  function setBoxTextOnEl(el, id, text) {
      if (!el) return;

      const silentBoxes = new Set([73, 81]);

      if (silentBoxes.has(Number(id))) {
        el.textContent = "";
        el.style.color = "";
        return;
      }

      el.textContent = text ?? "";

      const nId = Number(id);

      if (nId === 227) {
        el.style.whiteSpace = "pre-wrap";
        el.style.fontSize = "10px";
        el.style.fontWeight = "500";
        el.style.textAlign = "left";
        el.style.alignItems = "flex-start";
        el.style.justifyContent = "flex-start";
        el.style.lineHeight = "1.1";
        el.style.padding = "2px 3px";
      }

      if (nId >= 121 && nId <= 128) {
        el.style.fontSize = "11px";
        el.style.fontWeight = "400";
        el.style.padding = "0";
        el.style.textAlign = "center";
        el.style.alignItems = "center";
        el.style.justifyContent = "center";
        el.style.lineHeight = "1";
        el.style.transform = "translateY(1px)";
      }
      else if (nId >= 137 && nId <= 144) {
        el.style.fontSize = "11px";
        el.style.fontWeight = "400";
        el.style.padding = "0";
        el.style.textAlign = "center";
        el.style.alignItems = "center";
        el.style.justifyContent = "center";
        el.style.lineHeight = "1";
        el.style.transform = "translateY(1px)";
      }
      else {
        el.style.fontSize = "";
        el.style.fontWeight = "";
        el.style.padding = "";
        el.style.textAlign = "";
        el.style.alignItems = "";
        el.style.justifyContent = "";
        el.style.lineHeight = "";
        el.style.transform = "";
      }
  }

  function setP(pageIndex, id, text) {
    const el = getBoxOnPage(pageIndex, id);
    setBoxTextOnEl(el, id, text);
  }

  const setP1 = (id, text) => setP(0, id, text);
  const setP2 = (id, text) => setP(1, id, text);

  function getBox(id) { return getBoxOnPage(0, id); }
  function setBoxText(id, text) { return setP1(id, text); }

  window.setP = setP;
  window.setP1 = setP1;
  window.setP2 = setP2;
  window.getBoxOnPage = getBoxOnPage;

    function fmtNum(n, decimals = 1) {
      const x = Number(n);
      if (!Number.isFinite(x)) return "";
      return x.toFixed(decimals);
    }

    function norm360(deg) {
      const d = ((Number(deg) % 360) + 360) % 360;
      return Number.isFinite(d) ? d : 0;
    }

    function formatDeg3(d) {
      const n = Number(d);
      if (!Number.isFinite(n)) return "";
      return String(norm360(Math.round(n))).padStart(3, "0");
    }

    function norm180(deg) {
      let d = ((Number(deg) % 360) + 360) % 360;
      if (d > 180) d -= 360;
      return d;
    }

    function formatTAS(v) {
      const n = Number(v);
      if (!Number.isFinite(n)) return "";
      return String(Math.round(n)).padStart(3, "0");
    }

    function formatGPH(v) {
      const n = Number(v);
      if (!Number.isFinite(n)) return "";
      return (Math.round(n * 10) / 10).toFixed(1);
    }

    function parseHHMM(str) {
      const s = String(str || "").trim();
      const m = s.match(/^(\d{1,2}):(\d{2})$/);
      if (!m) return null;
      const hh = Number(m[1]), mm = Number(m[2]);
      if (!Number.isFinite(hh) || !Number.isFinite(mm)) return null;
      if (hh < 0 || hh > 23 || mm < 0 || mm > 59) return null;
      return hh * 60;
    }

    function formatHHMM(totalMinutes) {
      if (!Number.isFinite(totalMinutes)) return "";
      let m = Math.round(totalMinutes);
      m = ((m % (24 * 60)) + (24 * 60)) % (24 * 60);
      const hh = Math.floor(m / 60);
      const mm = m % 60;
      return String(hh).padStart(2, "0") + ":" + String(mm).padStart(2, "0");
    }

function isLegInClimb(i, plan) {
  const env = plan?.env || {};
  const legs = Array.isArray(plan?.legs) ? plan.legs : [];

  const climbTotalMin = Number(env.climbTimeMin);

  if (!Number.isFinite(climbTotalMin) || climbTotalMin <= 0) return false;

  if (!!env.tocBeforeFirstFix) return false;

  const fixDist = Number(env.firstFixDistNm);
  const tocDist = Number(env.climbDistWindNm);

  if (!Number.isFinite(fixDist) || fixDist < 0) return false;
  if (!Number.isFinite(tocDist) || tocDist <= 0) return false;

  const fracToFix = Math.max(0, Math.min(1, fixDist / tocDist));
  const climbToFixMin = climbTotalMin * fracToFix;

  let climbRemainingMin = Math.max(0, climbTotalMin - climbToFixMin);

  for (let k = 0; k < legs.length; k++) {
    const dist = Number(legs[k]?.distNm ?? 0);
    const tc   = Number(legs[k]?.tcDeg ?? NaN);
    if (!Number.isFinite(dist) || dist <= 0 || !Number.isFinite(tc)) continue;

    const tas = 74;

    let distFromDep = fixDist;
    for (let j = 0; j < k; j++) distFromDep += Number(legs[j]?.distNm ?? 0);
    distFromDep += dist / 2;

    const w = windAtClimbDistance(env, distFromDep);
    const gs = computeGsKt(tc, tas, Number(w.windFrom), Number(w.windKt));

    const legTimeMin =
      (Number.isFinite(gs) && gs > 0) ? (dist / gs) * 60 : 0;

    if (k === i) return climbRemainingMin > 0;

    climbRemainingMin -= legTimeMin;
    if (climbRemainingMin <= 0) return false;
  }

  return false;
}

    function tasForLeg(i, plan) {
      if (isLegInClimb(i, plan)) return 74;
      const cruise = Number(plan?.env?.cruiseTasKt);
      return Number.isFinite(cruise) ? cruise : NaN;
    }

function windsForSegment({ kind, i, env, plan }) {
  if (kind === "row1") {
    return {
      windFrom: Number(env.surfaceWindFromDeg ?? 0),
      windKt: Number(env.surfaceWindKt ?? 0)
    };
  }

  if (kind === "row2") {
    if (!!env.tocBeforeFirstFix) {
      const wf = Number.isFinite(Number(env.windFromDeg))
        ? Number(env.windFromDeg)
        : Number(env.surfaceWindFromDeg ?? 0);

      const wk = Number.isFinite(Number(env.windKt))
        ? Number(env.windKt)
        : Number(env.surfaceWindKt ?? 0);

      return { windFrom: wf, windKt: wk };
    } else {
      const distStart = Number(env.firstFixDistNm);
      const distMid = Number.isFinite(distStart)
        ? distStart + (Number(env.row2DistNm ?? 0) / 2)
        : distStart;

      const w = windAtClimbDistance(env, distMid);
      return { windFrom: Number(w.windFrom), windKt: Number(w.windKt) };
    }
  }

  if (kind === "row3plus") {
    if (isLegInClimb(i, plan)) {
      const avg = computeAvgAltEnvironment(env);
      return {
        windFrom: Number(avg?.windFromDeg ?? env.surfaceWindFromDeg ?? 0),
        windKt: Number(avg?.windKt ?? env.surfaceWindKt ?? 0)
      };
    }

    const wf = Number.isFinite(Number(env.windFromDeg))
      ? Number(env.windFromDeg)
      : Number(env.surfaceWindFromDeg ?? 0);

    const wk = Number.isFinite(Number(env.windKt))
      ? Number(env.windKt)
      : Number(env.surfaceWindKt ?? 0);

    return { windFrom: wf, windKt: wk };
  }

  return {
    windFrom: Number(env.surfaceWindFromDeg ?? 0),
    windKt: Number(env.surfaceWindKt ?? 0)
  };
}

    function computeGsKt(tcDeg, tasKt, windFromDeg, windKt) {
      const tc = Number(tcDeg);
      const tas = Number(tasKt);
      const wf = Number(windFromDeg);
      const wk = Number(windKt);

      if (![tc, tas, wf, wk].every(Number.isFinite)) return NaN;

      const delta = norm180(wf - tc);
      const headwind = wk * Math.cos(delta * Math.PI / 180);

      return tas - headwind;
    }

    function computeWcaSignedDeg(tcDeg, windFromDeg, windKt, tasKt) {
      const tc = Number(tcDeg);
      const wf = Number(windFromDeg);
      const wk = Number(windKt);
      const tas = Number(tasKt);

      if (![tc, wf, wk, tas].every(Number.isFinite) || tas <= 0) return 0;
      if (wk <= 0) return 0;

      const delta = norm180(wf - tc);
      const cross = wk * Math.sin((delta * Math.PI) / 180);
      const ratio = cross / tas;

      const clamped = Math.max(-1, Math.min(1, ratio));
      return Math.asin(clamped) * 180 / Math.PI;
    }

    function formatWcaToken(wcaSignedDeg) {
      const w = Number(wcaSignedDeg);
      if (!Number.isFinite(w) || Math.abs(w) < 0.5) return "";
      const abs = Math.round(Math.abs(w));
      const sign = w < 0 ? "-" : "+";
      return `${sign}${String(abs).padStart(2, "0")}`;
    }

    function formatVarTokenFromPlan(plan) {
      const dir = String(plan?.env?.magVarDir || "").toUpperCase();
      const deg = Number(plan?.env?.magVarDeg);
      if ((dir !== "E" && dir !== "W") || !Number.isFinite(deg)) return "";

      const abs = Math.round(Math.abs(deg));
      const sign = (dir === "E") ? "-" : "+";
      return `${sign}${String(abs).padStart(2, "0")}`;
    }

    function applyVariationToTH(thDeg, plan) {
      const th = Number(thDeg);
      if (!Number.isFinite(th)) return NaN;

      const dir = String(plan?.env?.magVarDir || "").toUpperCase();
      const v = Number(plan?.env?.magVarDeg ?? 0);
      const varDeg = Number.isFinite(v) ? v : 0;

      if (dir === "E") return norm360(th - varDeg);
      if (dir === "W") return norm360(th + varDeg);
      return norm360(th);
    }

    function clamp01(x) { return Math.max(0, Math.min(1, x)); }
    function degToRad(d) { return (d * Math.PI) / 180; }
    function radToDeg(r) { return (r * 180) / Math.PI; }
    function normalizeDeg(d) {
      if (!Number.isFinite(d)) return 0;
      return ((Math.round(d) % 360) + 360) % 360;
    }

    function interpWindDirDeg(dirFromA, dirFromB, f) {
      const a = normalizeDeg(Number(dirFromA));
      const b = normalizeDeg(Number(dirFromB));
      const ra = degToRad(a);
      const rb = degToRad(b);
      const xa = Math.cos(ra), ya = Math.sin(ra);
      const xb = Math.cos(rb), yb = Math.sin(rb);
      const x = xa + (xb - xa) * f;
      const y = ya + (yb - ya) * f;
      const ang = radToDeg(Math.atan2(y, x));
      return normalizeDeg(ang);
    }

    function computeAvgAltEnvironment(env) {
      const avgAltFt = Number(env.avgAltFt);
      const fieldElevFt = Number(env.fieldElevFt);
      const cruiseAltFt = Number(env.cruiseAltFt);

      if (!Number.isFinite(avgAltFt)) return null;

      const oatSurfaceC = Number(env.oatC);
      let tempAtAvgC = NaN;

      if (
        Number.isFinite(env.tempCruiseC) && Number.isFinite(oatSurfaceC) &&
        Number.isFinite(fieldElevFt) && Number.isFinite(cruiseAltFt) &&
        cruiseAltFt !== fieldElevFt
      ) {
        const f = clamp01((avgAltFt - fieldElevFt) / (cruiseAltFt - fieldElevFt));
        tempAtAvgC = oatSurfaceC + (Number(env.tempCruiseC) - oatSurfaceC) * f;
      } else if (Number.isFinite(oatSurfaceC) && Number.isFinite(fieldElevFt)) {
        const deltaFt = avgAltFt - fieldElevFt;
        tempAtAvgC = oatSurfaceC - (deltaFt / 1000) * 2;
      }

      const sKt = Number(env.surfaceWindKt ?? env.windKt);
      const sDir = Number(env.surfaceWindFromDeg ?? env.windFromDeg);

      const cKt = Number(env.windKt ?? env.surfaceWindKt);
      const cDir = Number(env.windFromDeg ?? env.surfaceWindFromDeg);

      let windKt = sKt;
      let windDir = sDir;

      if (
        Number.isFinite(fieldElevFt) && Number.isFinite(cruiseAltFt) && cruiseAltFt !== fieldElevFt &&
        Number.isFinite(sKt) && Number.isFinite(sDir) &&
        Number.isFinite(cKt) && Number.isFinite(cDir)
      ) {
        const f = clamp01((avgAltFt - fieldElevFt) / (cruiseAltFt - fieldElevFt));
        windKt = sKt + (cKt - sKt) * f;
        windDir = interpWindDirDeg(sDir, cDir, f);
      }

      return {
        windFromDeg: normalizeDeg(windDir),
        windKt: Number.isFinite(windKt) ? Math.round(windKt) : NaN,
        tempC: Number.isFinite(tempAtAvgC) ? tempAtAvgC : NaN
      };
    }

    function getCruiseTempC(env) {
      const raw = env?.tempCruiseC;
      if (raw !== "" && raw != null) {
        const t = Number(raw);
        if (Number.isFinite(t)) return t;
      }

      const pts = Array.isArray(env?.aloftPts) ? env.aloftPts : [];
      const alt = Number(env?.cruiseAltFt);
      if (!Number.isFinite(alt) || pts.length === 0) return NaN;

      const rows = pts
        .map(p => ({ altFt: Number(p.altFt), tempC: (p.tempC == null ? NaN : Number(p.tempC)) }))
        .filter(p => Number.isFinite(p.altFt) && Number.isFinite(p.tempC))
        .sort((a, b) => a.altFt - b.altFt);

      if (rows.length === 0) return NaN;

      if (alt <= rows[0].altFt) return rows[0].tempC;
      if (alt >= rows[rows.length - 1].altFt) return rows[rows.length - 1].tempC;

      for (let i = 0; i < rows.length - 1; i++) {
        const a = rows[i], b = rows[i + 1];
        if (alt >= a.altFt && alt <= b.altFt) {
          const f = (alt - a.altFt) / (b.altFt - a.altFt);
          return a.tempC + (b.tempC - a.tempC) * f;
        }
      }

      return NaN;
    }

    function windAtAlt(env, altFt) {
      const fieldElevFt = Number(env.fieldElevFt);
      const cruiseAltFt = Number(env.cruiseAltFt);

      const sKt  = Number(env.surfaceWindKt ?? 0);
      const sDir = Number(env.surfaceWindFromDeg ?? 0);

      const cKt  = Number(env.windKt ?? 0);
      const cDir = Number(env.windFromDeg ?? 0);

      if (![fieldElevFt, cruiseAltFt, altFt].every(Number.isFinite)) {
        return { windFrom: sDir, windKt: sKt };
      }
      if (cruiseAltFt === fieldElevFt) {
        return { windFrom: sDir, windKt: sKt };
      }

      const f = clamp01((altFt - fieldElevFt) / (cruiseAltFt - fieldElevFt));

      const windKt = sKt + (cKt - sKt) * f;
      const windFrom = interpWindDirDeg(sDir, cDir, f);

      return {
        windFrom: normalizeDeg(windFrom),
        windKt: Number.isFinite(windKt) ? Math.round(windKt) : NaN
      };
    }

    function windAtClimbDistance(env, distFromDepNm) {
      const tocDist = Number(env.climbDistWindNm);
      const fieldElevFt = Number(env.fieldElevFt);
      const cruiseAltFt = Number(env.cruiseAltFt);

      if (![tocDist, fieldElevFt, cruiseAltFt, distFromDepNm].every(Number.isFinite) || tocDist <= 0) {
        return {
          windFrom: Number(env.surfaceWindFromDeg ?? 0),
          windKt: Number(env.surfaceWindKt ?? 0)
        };
      }

      const frac = clamp01(distFromDepNm / tocDist);
      const altFt = fieldElevFt + (cruiseAltFt - fieldElevFt) * frac;

      return windAtAlt(env, altFt);
    }

function buildDisplayLegs(plan) {
  const legs = Array.isArray(plan?.legs) ? plan.legs : [];
  const env = plan?.env || {};
  const out = legs.map((l, idx) => ({ ...l, _origIndex: idx }));

  const tocBefore = !!env.tocBeforeFirstFix;
  const fixDist = Number(env.firstFixDistNm);
  const tocDist = Number(env.climbDistWindNm);
  const tod = env.tod;

  if (!tocBefore && out.length > 0 && Number.isFinite(fixDist) && Number.isFinite(tocDist) && tocDist > fixDist) {
    let tocFromFirstFixNm = tocDist - fixDist;

    if (Number.isFinite(tocFromFirstFixNm) && tocFromFirstFixNm > 0) {
      let cum = 0;

      for (let i = 0; i < out.length; i++) {
        const d = Number(out[i]?.distNm);
        if (!Number.isFinite(d) || d <= 0) continue;

        if (cum + d >= tocFromFirstFixNm) {
          const a = tocFromFirstFixNm - cum;
          const b = d - a;
          const original = out[i];

          const legA = {
            ...original,
            to: "TOC",
            distNm: a,
            _origIndex: original._origIndex,
            _phase: "climb"
          };

          const legB = {
            ...original,
            from: "TOC",
            distNm: b,
            _origIndex: original._origIndex,
            _phase: "cruise"
          };

          out.splice(i, 1, legA, legB);

          for (let k = i + 1; k < out.length; k++) {
            out[k]._phase = out[k]._phase || "cruise";
          }
          break;
        }

        cum += d;
      }
    }
  }

  if (tocBefore) {
    for (let i = 0; i < out.length; i++) out[i]._phase = out[i]._phase || "cruise";
  }

  if (tod?.ok) {
    const li = Number(tod.legIndex);
    const a = Number(tod.distFromLegStart);
    const b = Number(tod.distFromLegEnd);

    if (
      Number.isFinite(li) && li >= 0 && li < out.length &&
      Number.isFinite(a) && Number.isFinite(b) && a > 0 && b > 0
    ) {
      const original = out[li];

      const legA = {
        ...original,
        to: "TOD",
        distNm: a,
        _origIndex: original._origIndex,
        _phase: original._phase || "cruise"
      };

      const legB = {
        ...original,
        from: "TOD",
        distNm: b,
        _origIndex: original._origIndex,
        _phase: original._phase || "cruise"
      };

      out.splice(li, 1, legA, legB);
    }
  }

  if (tocBefore) {
    out.forEach(l => { l._phase = "cruise"; });
  } else {
    const idxTocEnd = out.findIndex(l =>
      String(l?.to || "").trim().toUpperCase() === "TOC"
    );

    if (idxTocEnd >= 0) {
      out.forEach((l, i) => {
        l._phase = (i <= idxTocEnd) ? "climb" : "cruise";
      });
    } else {
      out.forEach(l => { l._phase = l._phase || "cruise"; });
    }
  }

  return out;
}

function tempAtAltFromSurfaceAnd6000(env, altFt) {
  const oat = Number(env?.oatC);
  const fieldElevFt = Number(env?.fieldElevFt);
  const pts = Array.isArray(env?.aloftPts) ? env.aloftPts : [];

  if (!Number.isFinite(altFt) || !Number.isFinite(oat) || !Number.isFinite(fieldElevFt)) return NaN;

  const t6 = pts
    .map(p => ({ altFt: Number(p.altFt), tempC: p.tempC == null ? NaN : Number(p.tempC) }))
    .filter(p => Number.isFinite(p.altFt) && Number.isFinite(p.tempC))
    .find(p => p.altFt === 6000)?.tempC;

  if (!Number.isFinite(t6)) return NaN;

  if (6000 === fieldElevFt) return t6;

  const f = (altFt - fieldElevFt) / (6000 - fieldElevFt);
  return oat + (t6 - oat) * f;
}

  function autopopulate() {

  const climbDistTotalNm  = Number(env.climbDistWindNm ?? env.climbDistStillAirNm);

    const d = Number(distNm);

    if (
      !Number.isFinite(d) || d < 0 ||
      !Number.isFinite(climbTimeTotalMin) ||
      !Number.isFinite(climbDistTotalNm) || climbDistTotalNm <= 0

          : NaN;

      setP2(129 + r, Number.isFinite(fuelGal) ? fmtNum(fuelGal, 2) : "");
      setFuelRemaining(1, r, fuelGal);
    }
  }

  setP1(17, Number.isFinite(Number(env.oatC)) ? String(Math.round(Number(env.oatC))) : "");

  const cruiseAlt = Number(env?.cruiseAltFt);

  const aloftTC = (Number.isFinite(cruiseAlt) && cruiseAlt < 6000)
    ? tempAtAltFromSurfaceAnd6000(env, cruiseAlt)
    : getCruiseTempC(env);

  const aloftText = Number.isFinite(aloftTC) ? String(Math.round(aloftTC)) : "";

  setP1(18, aloftText);

  for (let r = 2; r < 8; r++) {
    const leg = displayLegs?.[r - 2];
    setP1(17 + r, leg ? aloftText : "");
  }

  if (POPULATE_PAGE2) {
    for (let r = 0; r < 8; r++) {
      const leg = displayLegs?.[6 + r];
      setP2(17 + r, leg ? aloftText : "");
    }
  }

  savePlan(plan);
}

    window.addEventListener("focus", autopopulate);

    // INIT
    try {
      drawAllBoxes();
      autopopulate();
    } catch (err) {
      console.error("INIT ERROR:", err);
      alert("Navlog init error — check console.");
    }
  </script>
</body>
